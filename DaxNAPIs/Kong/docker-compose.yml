version: '3.9'

services:

  kong-migrations:
    image: kong:3.9.1
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_DATABASE: kong_db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    networks:
      - platform-network

  kong:
    image: kong:3.9.1
    container_name: kong
    depends_on:
      - kong-migrations
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_DATABASE: kong_db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong

      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001

    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - platform-network

networks:
  platform-network:
    external: true